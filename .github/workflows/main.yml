name : Postman collection Run API Test

on: 
  push: 
    branches: [main]
  workflow_dispatch: 
  schedule:
    - cron: 30 02 * * *
    - cron: 00 14 * * *
    - cron: 00 06 * * 1-5

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: checkout the code
        uses: actions/checkout@v7.0.0

      - name: Install node js environment
        uses: actions/setup-node@v6.5.0
        with:
          node-version: '22'

      - name: Install the newman & html-extra globally
        run: |
               npm install -g newman
               npm install -g newman-reporter-htmlextra

      - name: Run the postman collection though newman
        run: |
              newman run 'Inwarranty-flow Collection.postman_collection.json' \
              -e QA.postman_environment.json \
              -d testData.csv \
              -r cli,htmlextra \
              --reporter-htmlextra-export ./newman/index.html

      - name: Archieve the report
        if: always() #To ensure test will run whether test is passed or not
        uses: actions/upload-artifact@v7.0.1
        with: 
          name: Newman report
          path: newman/*.html

      - name: Creating github pages branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: phoneix inwarranty flow colletion test report
          to: srajan.falke@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
                 hi, 
                 The execution has been done, URL of the report is : https://srajanfalke.github.io/Phoenix-Warranty-Flow/

  
